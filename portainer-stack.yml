# Portainer Stack — seiyuu.db
# Paste this into Portainer > Stacks > Add stack > Web editor

services:
  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    # 🔒 Kept purely internal, no caddy-proxy attached

  api:
    image: ghcr.io/ghifaryh/seiyuu-db-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      SYNC_ON_STARTUP: "false"
    depends_on:
      - meilisearch
    networks:
      - default      # 🤝 To talk to meilisearch
      - caddy-proxy  # 🌐 To talk to Caddy

  web:
    image: ghcr.io/ghifaryh/seiyuu-db-web:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      API_URL: http://api:3001
    depends_on:
      - api
    networks:
      - default      # 🤝 To talk to api
      - caddy-proxy  # 🌐 To talk to Caddy

volumes:
  meili_data:

# 🧳 Declare the existing external network room
networks:
  caddy-proxy:
    external: true