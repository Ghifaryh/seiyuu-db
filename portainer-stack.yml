# Portainer Stack — seiyuu.db
# Paste this into Portainer > Stacks > Add stack > Web editor
#
# Required environment variables (set in Portainer UI):
#   MEILI_MASTER_KEY  — MeiliSearch API key
#   DATABASE_URL      — PostgreSQL connection string
#   JWT_SECRET        — JWT signing secret
#
# In your Caddyfile, add:
#   handle_path /api/* {
#     reverse_proxy api:3001
#   }
#   handle {
#     reverse_proxy web:4321
#   }

services:
  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data

  api:
    image: ghcr.io/ghifaryh/seiyuu-db-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      SYNC_ON_STARTUP: "false"
    depends_on:
      - meilisearch

  web:
    image: ghcr.io/ghifaryh/seiyuu-db-web:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      API_URL: http://api:3001
    depends_on:
      - api

volumes:
  meili_data:

volumes:
  meili_data:
