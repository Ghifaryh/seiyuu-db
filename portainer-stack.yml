# Portainer Stack — seiyuu.db
# Paste this into Portainer > Stacks > Add stack > Web editor
#
# Required environment variables (set in Portainer UI):
#   MEILI_MASTER_KEY  — MeiliSearch API key
#   DATABASE_URL      — PostgreSQL connection string
#   JWT_SECRET        — JWT signing secret
#
# IMPORTANT: The frontend expects the API at http://localhost:3001.
# Run a reverse proxy (nginx/traefik) on your VPS:
#   - Route /api/* to the api container (port 3001)
#   - Route everything else to the web container (port 4321)
# Or set both ports to public and update the frontend build arg.

services:
  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  api:
    image: ghcr.io/ghifaryh/seiyuu-db-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      SYNC_ON_STARTUP: "false"
    ports:
      - "3001:3001"
    depends_on:
      - meilisearch

  web:
    image: ghcr.io/ghifaryh/seiyuu-db-web:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "4321:4321"
    depends_on:
      - api

volumes:
  meili_data:
